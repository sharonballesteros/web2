<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad: Generador de Listas</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #333; margin-top: 0; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #218838; }
        #contenedor-listas { margin-top: 20px; }
        .item-lista { background: #e9ecef; padding: 8px; margin-bottom: 5px; border-radius: 4px; font-size: 0.9rem; color: #495057; border-left: 5px solid #28a745; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Generador Dinámico</h2>
        <p>Introduce un número para crear listas:</p>
        
        <input type="number" id="inputNumero" placeholder="Ejemplo: 5" min="1">
        <button id="btnGenerar">Generar Listas</button>

        <div id="contenedor-listas">
            </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
